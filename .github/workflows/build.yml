name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # IntelliJ plugin module requires a local IDEA install — skip on CI.
      - name: Runtime tests
        run: ./gradlew --no-daemon :hypermixins-runtime:test

      - name: Example KSP + descriptor integration tests
        run: ./gradlew --no-daemon :hypermixins-example:test

      - name: Agent shadow jar + premain integration test
        run: ./gradlew --no-daemon :hypermixins-agent:test

      - name: Assert test count >= baseline
        run: |
          set -e
          baseline_file=.github/test-baseline.txt
          fail=0
          while IFS='=' read -r module expected; do
            [ -z "$module" ] && continue
            actual=$(grep -hoE 'tests="[0-9]+"' "$module"/build/test-results/test/TEST-*.xml 2>/dev/null \
                       | grep -oE '[0-9]+' \
                       | awk '{ s += $1 } END { print s+0 }')
            echo "$module: actual=$actual baseline=$expected"
            if [ "$actual" -lt "$expected" ]; then
              echo "::error::$module test count regressed: $actual < $expected"
              fail=1
            fi
          done < "$baseline_file"
          [ "$fail" -eq 0 ]

      - name: Upload failing test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
